<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ - BAERYNIA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="header"></div>

<main class="account-page">
  <div class="account-container">
    <h1>マイページ</h1>

    <div class="account-grid">
      <!-- Profile Section -->
      <div class="account-card">
        <h2>プロフィール</h2>
        <form id="profileForm" onsubmit="updateProfile(event)">
          <div class="form-group">
            <label>お名前</label>
            <input type="text" id="fullName" placeholder="你的お名前">
          </div>
          <div class="form-group">
            <label>電話番号</label>
            <input type="tel" id="phone" placeholder="13800138000">
          </div>
          <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" id="email" disabled>
          </div>
          <div id="profileMsg" class="form-success"></div>
          <button type="submit" class="btn-secondary">保存</button>
        </form>
      </div>

      <!-- Addresses Section -->
      <div class="account-card">
        <h2>お届け先住所</h2>
        <div id="addressList"></div>
        <button class="btn-secondary" onclick="showAddressForm()">+ 新しい住所を追加</button>
        <div id="addressForm" style="display:none" class="address-form">
          <form onsubmit="saveAddress(event)">
            <div class="form-row">
              <div class="form-group"><label>お名前</label><input type="text" id="addrName" required></div>
              <div class="form-group"><label>電話番号</label><input type="tel" id="addrPhone" required></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>都道府県</label><input type="text" id="addrProvince" required placeholder="如：北京市"></div>
              <div class="form-group"><label>市区町村</label><input type="text" id="addrDistrict" placeholder="如：朝阳区"></div>
            </div>
            <div class="form-group"><label>住所詳細</label><input type="text" id="addrDetail" required placeholder="街道、楼栋、门牌号"></div>
            <div class="form-group">
              <label><input type="checkbox" id="addrDefault"> デフォルトに設定</label>
            </div>
            <div class="form-row">
              <button type="submit" class="btn-secondary">住所を保存</button>
              <button type="button" class="btn-ghost" onclick="hideAddressForm()">キャンセル</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="account-links">
      <a href="orders.html" class="account-link-card">
        <span class="link-icon">📦</span>
        <span>注文履歴</span>
      </a>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=2"></script>
<script src="auth.js?v=2"></script>
<script>
  document.getElementById('header').innerHTML = renderHeader();
  Auth.init().then(() => {
    if (!Auth.requireLogin()) return;
    loadProfile();
    loadAddresses();
  });

  async function loadProfile() {
    const p = Auth.profile;
    if (p) {
      document.getElementById('fullName').value = p.full_name || '';
      document.getElementById('phone').value = p.phone || '';
      document.getElementById('email').value = p.email || '';
    }
  }

  async function updateProfile(e) {
    e.preventDefault();
    const { error } = await sb.from('profiles').update({
      full_name: document.getElementById('fullName').value,
      phone: document.getElementById('phone').value
    }).eq('id', Auth.currentUser.id);
    const msg = document.getElementById('profileMsg');
    msg.textContent = error ? '保存に失敗: ' + error.message : '保存しました';
    await Auth.loadProfile();
  }

  async function loadAddresses() {
    const { data } = await sb.from('addresses').select('*')
      .eq('user_id', Auth.currentUser.id).order('is_default', { ascending: false });
    const list = document.getElementById('addressList');
    if (!data || data.length === 0) {
      list.innerHTML = '<p class="text-muted">暂无お届け先住所</p>';
      return;
    }
    list.innerHTML = data.map(a => `
      <div class="address-card ${a.is_default ? 'default' : ''}">
        <div><strong>${a.name}</strong> ${a.phone} ${a.is_default ? '<span class="tag">デフォルト</span>' : ''}</div>
        <div class="text-muted">${a.province} ${a.city} ${a.district} ${a.detail}</div>
        <div class="address-actions">
          ${!a.is_default ? `<button onclick="setDefault('${a.id}')">设为デフォルト</button>` : ''}
          <button onclick="deleteAddress('${a.id}')">削除</button>
        </div>
      </div>
    `).join('');
  }

  function showAddressForm() { document.getElementById('addressForm').style.display = 'block'; }
  function hideAddressForm() { document.getElementById('addressForm').style.display = 'none'; }

  async function saveAddress(e) {
    e.preventDefault();
    if (document.getElementById('addrDefault').checked) {
      await sb.from('addresses').update({ is_default: false }).eq('user_id', Auth.currentUser.id);
    }
    const { error } = await sb.from('addresses').insert({
      user_id: Auth.currentUser.id,
      name: document.getElementById('addrName').value,
      phone: document.getElementById('addrPhone').value,
      province: document.getElementById('addrProvince').value,
      city: '',
      district: document.getElementById('addrDistrict').value,
      detail: document.getElementById('addrDetail').value,
      is_default: document.getElementById('addrDefault').checked
    });
    if (!error) { hideAddressForm(); loadAddresses(); e.target.reset(); }
  }

  async function setDefault(id) {
    await sb.from('addresses').update({ is_default: false }).eq('user_id', Auth.currentUser.id);
    await sb.from('addresses').update({ is_default: true }).eq('id', id);
    loadAddresses();
  }

  async function deleteAddress(id) {
    if (confirm('この住所を削除しますか？')) {
      await sb.from('addresses').delete().eq('id', id);
      loadAddresses();
    }
  }
</script>
</body>
</html>
