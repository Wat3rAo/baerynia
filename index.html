<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAERYNIA（ベアリニア）</title>
<meta name="description" content="ベアリニア公式サイト。上質な日常着、コート、ニット、ジーンズ、靴、小物を展開。シンプルで機能的な日本発のファッションブランド。">
</head>
<body>
<div id="header"></div>

<!-- HERO -->
<section class="hero" id="heroSection">
  <div class="hero-content">
    <h1>ベアリニア</h1>
    <p>上質を、日常的に。</p>
    <button class="hero-btn" onclick="showPage('all')">すべて見る</button>
  </div>
</section>

<!-- PRODUCT GRID -->
<div id="productSection" style="display:none;">
  <div class="section-bar">
    <div>
      <h2 class="section-title" id="sectionTitle">すべて</h2>
      <p class="section-subtitle" id="sectionSubtitle">全アイテム</p>
    </div>
  </div>
  <div class="product-grid" id="productGrid"></div>
</div>

<!-- CART -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h2 id="cartTitle">ショッピングバッグ</h2>
    <button class="cart-close" onclick="closeCart()">&times;</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span id="totalLabel">合計</span>
      <span id="cartTotal">¥0</span>
    </div>
    <button class="btn-primary btn-full" id="checkoutBtn" onclick="goCheckout()">購入手続きへ</button>
  </div>
</div>

<!-- SEARCH -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-header">
    <input type="text" class="search-input" id="searchInput" placeholder="アイテムを検索..." oninput="doSearch(this.value)">
    <button class="search-close" onclick="toggleSearch()">&times;</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-grid">
    <div class="footer-col">
      <h3>カスタマーサポート</h3>
      <a href="#">お問い合わせ</a><a href="#">配送について</a><a href="#">返品・交換</a><a href="#">FAQ</a>
    </div>
    <div class="footer-col">
      <h3>ブランドについて</h3>
      <a href="#">ブランドストーリー</a><a href="#">サステナビリティ</a><a href="#">採用情報</a>
    </div>
    <div class="footer-col">
      <h3>利用規約</h3>
      <a href="#">プライバシーポリシー</a><a href="#">利用規約</a><a href="#">Cookie</a>
    </div>
    <div class="footer-col">
      <h3>フォロー</h3>
      <a href="#">Instagram</a><a href="#">X</a><a href="#">LINE</a>
    </div>
  </div>
  <div class="footer-bottom">© 2026 BAERYNIA. All rights reserved.</div>
</footer>

<div class="notification" id="notification"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v2"></script>
<script src="auth.js?v2"></script>
<script src="products.js?v2"></script>
<script src="app.js?v2"></script>
</body>
</html>
