<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAERYNIA</title>
<meta name="description" content="BAERYNIA - 时尚品牌，提供外套、上装、下装、配饰、鞋履、包袋">
<meta property="og:title" content="BAERYNIA">
<meta property="og:description" content="Premium fashion with modern minimalist design.">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header"></div>

<!-- HERO -->
<section class="hero" id="heroSection">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <h1>BAERYNIA</h1>
    <p>2026 秋冬系列</p>
    <button class="hero-btn" onclick="showPage('all')">立即选购</button>
  </div>
</section>

<!-- PRODUCT GRID -->
<div id="productSection" style="display:none;">
  <h2 class="section-title" id="sectionTitle">全部</h2>
  <div class="product-grid" id="productGrid"></div>
</div>

<!-- CART OVERLAY -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

<!-- CART DRAWER -->
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h2>购物袋</h2>
    <button class="cart-close" onclick="closeCart()">&times;</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>总计</span>
      <span id="cartTotal">¥0</span>
    </div>
    <button class="btn-primary btn-full" id="checkoutBtn" onclick="goCheckout()">去结算</button>
  </div>
</div>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-header">
    <input type="text" class="search-input" id="searchInput" placeholder="搜索产品..." oninput="doSearch(this.value)">
    <button class="search-close" onclick="toggleSearch()">&times;</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-grid">
    <div class="footer-col">
      <h3>客户服务</h3>
      <a href="#">联系我们</a><a href="#">配送信息</a><a href="#">退换货</a><a href="#">常见问题</a>
    </div>
    <div class="footer-col">
      <h3>关于</h3>
      <a href="#">品牌故事</a><a href="#">可持续发展</a><a href="#">招贤纳士</a>
    </div>
    <div class="footer-col">
      <h3>法律条款</h3>
      <a href="#">隐私政策</a><a href="#">服务条款</a><a href="#">Cookie 政策</a>
    </div>
    <div class="footer-col">
      <h3>关注我们</h3>
      <a href="#">Instagram</a><a href="#">Weibo</a><a href="#">X</a>
    </div>
  </div>
  <div class="footer-bottom">© 2026 BAERYNIA. All rights reserved.</div>
</footer>

<div class="notification" id="notification"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=7"></script>
<script src="auth.js?v=7"></script>
<script src="products.js?v=7"></script>
<script src="app.js?v=7"></script>
</body>
</html>
